<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --cream:  #FBF6EC;
    --card:   #FFFDF8;
    --ink:    #1C1A15;
    --ink-soft:#4A4436;
    --line:   #E4D9C1;
    --line-2: #D6C7A6;
    --amber:  #F4A62A;
    --amber-deep:#B4610A;
    --amber-tint:#FCEBCB;
    --teal:   #137E77;
    --teal-deep:#0C5E58;
    --teal-tint:#DBEFED;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --num:  ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    position: relative;
    background:
      radial-gradient(1100px 560px at 88% -14%, rgba(244,166,42,0.16), transparent 60%),
      radial-gradient(760px 460px at 2% 108%, rgba(19,126,119,0.10), transparent 58%),
      var(--cream);
    font-family: var(--sans);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* day-arc sky ribbon along the top — the dosewell signature */
  .sky {
    position: absolute; top: 0; left: 0; width: 1200px; height: 150px;
  }
  .sky rect { }
  .arc { fill: none; stroke: #C99A3F; stroke-width: 3; stroke-dasharray: 3 9; stroke-linecap: round; opacity: 0.8; }
  .sun { fill: var(--amber); stroke: var(--cream); stroke-width: 4; }

  .frame {
    position: absolute; inset: 0;
    padding: 96px 90px 84px;
    display: flex; flex-direction: column; justify-content: space-between;
  }

  .brand { display: flex; align-items: center; gap: 22px; }
  .mark { width: 82px; height: 82px; flex: none; }
  .wordmark { font-size: 62px; font-weight: 800; letter-spacing: -0.035em; color: var(--ink); }

  .headline { max-width: 940px; }
  .headline h1 {
    font-size: 72px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.08; color: var(--ink);
  }
  .headline .tap { color: var(--teal-deep); }
  .headline p {
    margin-top: 26px; font-size: 32px; font-weight: 600; color: var(--ink-soft);
    line-height: 1.34; max-width: 30ch;
  }

  .chips { display: flex; align-items: center; gap: 14px; }
  .chip {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 14px 22px; border-radius: 999px;
    background: var(--card); border: 1px solid var(--line-2);
    font-size: 24px; font-weight: 700; color: var(--ink-soft);
  }
  .chip .g { width: 26px; height: 26px; display: block; }
  .chip .g svg { width: 26px; height: 26px; fill: none; stroke: var(--amber-deep); stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; }
  .chip--taken {
    background: var(--teal-tint); border-color: var(--teal); color: var(--teal-deep);
  }
  .chip--taken .check { width: 26px; height: 26px; }
  .chip--taken .check svg { width: 26px; height: 26px; fill: none; stroke: var(--teal-deep); stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
  <svg class="sky" viewBox="0 0 1200 150" preserveAspectRatio="none" aria-hidden="true">
    <defs>
      <linearGradient id="sky" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#FCE9C2"/>
        <stop offset="0.5" stop-color="#FFF4D6"/>
        <stop offset="1" stop-color="#E7D8C4"/>
      </linearGradient>
    </defs>
    <rect x="0" y="0" width="1200" height="150" fill="url(#sky)"/>
    <path class="arc" d="M0 132 Q 300 22 600 56 T 1200 132"/>
    <circle class="sun" cx="470" cy="46" r="15"/>
  </svg>

  <div class="frame">
    <div class="brand">
      <svg class="mark" viewBox="0 0 48 48" aria-hidden="true">
        <circle cx="24" cy="24" r="21" fill="none" stroke="#D6C7A6" stroke-width="2.5"/>
        <path d="M8 24a16 16 0 0 1 32 0z" fill="#F4A62A"/>
        <path d="M8 24a16 16 0 0 0 32 0z" fill="#137E77"/>
        <line x1="8" y1="24" x2="40" y2="24" stroke="#FBF6EC" stroke-width="2.5"/>
      </svg>
      <span class="wordmark">dosewell</span>
    </div>

    <div class="headline">
      <h1>Never miss a dose &mdash;<br><span class="tap">one gentle tap.</span></h1>
      <p>A big, calm medication reminder for elders and the people who care for them.</p>
    </div>

    <div class="chips">
      <span class="chip"><span class="g"><svg viewBox="0 0 24 24"><circle cx="12" cy="14" r="5"/><path d="M12 4v3M4.5 9l2 1.5M19.5 9l-2 1.5M3 20h18"/></svg></span>Morning &middot; Noon &middot; Evening &middot; Night</span>
      <span class="chip chip--taken"><span class="check"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></span>Taken</span>
      <span class="chip">Fully offline</span>
    </div>
  </div>
</body>
</html>
