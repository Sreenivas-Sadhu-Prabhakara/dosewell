<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { display: grid; place-items: center; background: #FBF6EC; }
  /* ~12% safe padding -> mark fills the middle */
  .icon { width: 76vmin; height: 76vmin; display: block; }
</style>
</head>
<body>
  <svg class="icon" viewBox="0 0 100 100" aria-hidden="true">
    <!-- rounded warm tile -->
    <rect width="100" height="100" rx="24" fill="#FBF6EC"/>
    <!-- soft sunrise wash behind -->
    <circle cx="50" cy="50" r="34" fill="#FCEBCB"/>
    <!-- the split pill: amber over teal, a horizon line through it -->
    <circle cx="50" cy="50" r="30" fill="none" stroke="#D6C7A6" stroke-width="3"/>
    <path d="M20 50a30 30 0 0 1 60 0z" fill="#F4A62A"/>
    <path d="M20 50a30 30 0 0 0 60 0z" fill="#137E77"/>
    <line x1="20" y1="50" x2="80" y2="50" stroke="#FBF6EC" stroke-width="4"/>
    <!-- small rising sun mark on the amber half -->
    <circle cx="50" cy="38" r="6" fill="#FBF6EC"/>
  </svg>
</body>
</html>
